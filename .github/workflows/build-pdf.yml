name: Build Resume PDF

on:
  push:
    branches: [master]
    paths: ['src/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/resume.tex
          args: -output-directory=pdf

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdf/resume.pdf
          git diff --cached --quiet && echo "No changes to PDF" || git commit -m "chore: rebuild resume PDF" && git push
